<!doctype html>

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      // Sets the dark/light class before first paint so there is never a flash of
      // the wrong theme while React mounts. Mirrors ThemeToggle's own decision
      // logic exactly; kept deliberately tiny and defensive since it runs before
      // any error boundary exists.
      (function () {
        try {
          var savedTheme = localStorage.getItem("theme");
          var prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          var isDark = savedTheme ? savedTheme === "dark" : prefersDark;
          document.documentElement.classList.toggle("dark", isDark);
        } catch (e) {
          document.documentElement.classList.add("dark");
        }
      })();
    </script>
